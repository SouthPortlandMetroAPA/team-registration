<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Glow rays -->
  <g stroke="#f5c518" stroke-width="3" stroke-linecap="round" opacity="0.8">
    <line x1="50" y1="5" x2="50" y2="15"/>
    <line x1="20" y1="18" x2="27" y2="25"/>
    <line x1="80" y1="18" x2="73" y2="25"/>
    <line x1="8" y1="42" x2="18" y2="42"/>
    <line x1="92" y1="42" x2="82" y2="42"/>
    <line x1="15" y1="65" x2="23" y2="60"/>
    <line x1="85" y1="65" x2="77" y2="60"/>
  </g>
  <!-- Bulb glass -->
  <path d="M50 20 C30 20 18 35 18 48 C18 58 24 66 32 72 L32 78 L68 78 L68 72 C76 66 82 58 82 48 C82 35 70 20 50 20Z" fill="url(#bulbGrad)" stroke="#c8961e" stroke-width="1.5"/>
  <!-- Filament glow -->
  <ellipse cx="50" cy="44" rx="14" ry="16" fill="#fff8dc" opacity="0.6"/>
  <ellipse cx="50" cy="42" rx="8" ry="10" fill="#fff" opacity="0.4"/>
  <!-- Filament -->
  <path d="M44 55 L44 38 C44 34 48 30 50 30 C52 30 56 34 56 38 L56 55" fill="none" stroke="#b8860b" stroke-width="2"/>
  <!-- Base/screw -->
  <rect x="34" y="78" width="32" height="5" rx="1" fill="#a0a0a8"/>
  <rect x="36" y="83" width="28" height="4" rx="1" fill="#8a8a92"/>
  <rect x="38" y="87" width="24" height="4" rx="1" fill="#a0a0a8"/>
  <rect x="40" y="91" width="20" height="3" rx="1.5" fill="#8a8a92"/>
  <!-- Contact point -->
  <circle cx="50" cy="96" r="3" fill="#707078"/>
  <!-- Gradient -->
  <defs>
    <radialGradient id="bulbGrad" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="40%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#e6a800"/>
    </radialGradient>
  </defs>
</svg>